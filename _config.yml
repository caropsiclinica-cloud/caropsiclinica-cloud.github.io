# ════════════════════════════════════════
# _config.yml — Eunice Carolina Monterrubio Roché
# Psicóloga Clínica · CDMX
# ════════════════════════════════════════

# ── Informations de base
title: "Eunice Carolina Monterrubio Roché"
tagline: "Psicóloga Clínica · CDMX"
description: >
  Psicóloga clínica en Ciudad de México. Consultas individuales, de pareja
  y en línea en español y francés. Formación en la Université Paris VIII.
  Espacio seguro, confidencial y estructurado.

url: "https://monterrubioroche.com"
baseurl: ""
lang: "es"
timezone: America/Mexico_City

# ── Auteur
author:
  name: "Eunice Carolina Monterrubio Roché"
  email: "eunice@monterrubioroche.com"
  bio: "Psicóloga clínica formada en la Université Paris VIII. Consultas en CDMX y en línea, en español y en francés."

# ── Plugins (activés nativement sur GitHub Pages)
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# ── SEO tag configuration
twitter:
  card: summary_large_image

social:
  name: "Eunice Carolina Monterrubio Roché"
  links:
    - https://www.instagram.com/euniceMonterrubioRoche

# ── Feed RSS
feed:
  title: "Journal clínico — Eunice Monterrubio Roché"
  path: feed.xml

# ── Permalinks — URLs propres et SEO-friendly
permalink: /:title/

# ── Collections et blog
collections:
  posts:
    output: true
    permalink: /:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Eunice Carolina Monterrubio Roché"
      lang: es

# ── Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md

# ── Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true

# ── Pagination (optionnel, pour le blog)
paginate: 6
paginate_path: "/blog/page:num/"
